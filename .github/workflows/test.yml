name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers
      TMPDIR: ${{ github.workspace }}/.runtime-tmp
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked test dependencies
        run: |
          mkdir -p "$TMPDIR"
          npm ci
      - name: Check JavaScript syntax
        run: |
          npm run check
          node --check playwright.config.mjs
          node --check tests/release.spec.mjs
      - name: Run unit and static release tests
        run: npm test
      - name: Install locked Chromium
        run: npx playwright install --with-deps chromium
      - name: Run browser release contract
        run: npm run test:e2e
